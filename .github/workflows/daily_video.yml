name: Daily Auto Shorts Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 7 * * *"
    - cron: "0 10 * * *"
    - cron: "0 13 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      skip_youtube:
        description: "Skip YouTube upload"
        type: boolean
        default: false
      skip_instagram:
        description: "Skip Instagram upload"
        type: boolean
        default: true

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: auto_shorts

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: auto_shorts/requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime directories
        run: mkdir -p config output/videos output/audio output/subtitles output/assets logs

      - name: Write YouTube token from secret
        if: ${{ !inputs.skip_youtube }}
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > config/yt_token.json

      - name: Write YouTube client secrets from secret
        if: ${{ !inputs.skip_youtube }}
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > config/yt_client_secrets.json

      - name: Run scheduled pipeline
        if: ${{ github.event_name == 'schedule' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TTS_ENGINE: edge
          TTS_VOICE: en-US-AriaNeural
          YOUTUBE_TOKEN_FILE: config/yt_token.json
          LOG_LEVEL: INFO
        run: python main.py --no-instagram --whisper-model tiny

      - name: Run manual pipeline
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TTS_ENGINE: edge
          TTS_VOICE: en-US-AriaNeural
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          YOUTUBE_TOKEN_FILE: config/yt_token.json
          LOG_LEVEL: INFO
        run: |
          YOUTUBE_FLAG=""
          INSTAGRAM_FLAG=""
          if [ "${{ inputs.skip_youtube }}" = "true" ]; then YOUTUBE_FLAG="--no-youtube"; fi
          if [ "${{ inputs.skip_instagram }}" = "true" ]; then INSTAGRAM_FLAG="--no-instagram"; fi
          python main.py $YOUTUBE_FLAG $INSTAGRAM_FLAG --whisper-model tiny

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: auto_shorts/logs/
          retention-days: 7

      - name: Upload generated video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video-${{ github.run_id }}
          path: auto_shorts/output/videos/*.mp4
          retention-days: 3
